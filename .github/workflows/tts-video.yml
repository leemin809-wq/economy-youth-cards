name: TTS 생성 + 영상 합성 + 유튜브 업로드

on:
  repository_dispatch:
    types: [generate-tts-video]

jobs:
  tts-and-video:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 시스템 패키지 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk
          pip install edge-tts --break-system-packages

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install

      - name: 카드 데이터 저장
        run: |
          echo '${{ toJSON(github.event.client_payload) }}' > pipeline_data.json

      - name: Edge TTS 나레이션 생성
        run: |
          python3 -c "
          import asyncio, edge_tts, json

          async def generate():
              with open('pipeline_data.json') as f:
                  data = json.load(f)
              script = data['fullTTSScript']
              voice = f\"ko-KR-{data['ttsVoice']}\"
              rate = f\"+{int((float(data['ttsSpeed']) - 1) * 100)}%\"
              communicate = edge_tts.Communicate(script, voice, rate=rate)
              await communicate.save('output/narration.mp3')
              print(f'TTS 완료: {voice}')

          asyncio.run(generate())
          "

      - name: output 폴더 생성
        run: mkdir -p output/cards

      - name: SRT 자막 파일 생성
        run: python3 scripts/generate-srt.py pipeline_data.json output/subtitle.srt

      - name: 카드 PNG 렌더링
        run: |
          npm install puppeteer
          node scripts/render-cards.js

      - name: FFmpeg 영상 합성
        run: |
          SUBTITLE_PARAMS="${{ github.event.client_payload.subtitleParams }}"
          ffmpeg \
            -framerate 1/3 \
            -i output/cards/card_%d.png \
            -i output/narration.mp3 \
            -vf "scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2,subtitles=output/subtitle.srt:force_style='${SUBTITLE_PARAMS}'" \
            -c:v libx264 -preset fast -crf 23 \
            -c:a aac -b:a 128k \
            -shortest \
            output/final_shorts.mp4
          echo "FFmpeg 완료"

      - name: 유튜브 Shorts 업로드
        run: node scripts/upload-youtube.js
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

      - name: 텔레그램 완료 알림
        run: |
          python3 -c "
          import urllib.request, json, os
          token = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          msg = '✅ 경제청년 발행 완료! 유튜브·인스타·스레드 업로드 완료'
          url = f'https://api.telegram.org/bot{token}/sendMessage'
          data = json.dumps({'chat_id': chat_id, 'text': msg}).encode()
          req = urllib.request.Request(url, data, {'Content-Type': 'application/json'})
          urllib.request.urlopen(req)
          "
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: 최종 영상 아티팩트 저장
        uses: actions/upload-artifact@v4
        with:
          name: final-video-${{ github.run_id }}
          path: output/final_shorts.mp4
          retention-days: 30
